<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>PULKREN · Detailing a domicilio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#45596c;
    --navy-ink:#28333d;
    --orange:#e65d2d;
    --orange-soft:#ff8352;
    --ink:#232b32;
    --paper:#fbfaf8;
    --card:#ffffff;
    --card-line:rgba(30,40,50,0.10);
    --card-shadow:0 2px 12px rgba(30,40,50,0.05);
  }

  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    min-height:100vh;
    background:
      radial-gradient(120% 90% at 50% -8%, #ffffff 0%, var(--paper) 55%, #f4f1ea 100%);
    font-family:'Montserrat',sans-serif;
    color:var(--ink);
    overflow-x:hidden;
    display:flex;
    justify-content:center;
    position:relative;
  }

  /* ---------- Background texture: brand diagonal strokes, animated + reacts to touch/mouse ---------- */
  .bg-fx{
    position:fixed;
    inset:0;
    z-index:0;
    overflow:hidden;
    pointer-events:none;
    opacity:0.4;
    transition:transform 0.4s ease-out;
  }
  .bg-fx svg{ position:absolute; }
  .bg-fx .top{
    top:-8%; right:-18%; width:70vw; max-width:520px;
    animation:driftTop 7s ease-in-out infinite;
  }
  .bg-fx .bottom{
    bottom:-10%; left:-20%; width:65vw; max-width:480px; transform:rotate(180deg);
    animation:driftBottom 8s ease-in-out infinite;
  }
  @keyframes driftTop{
    0%, 100% { transform:translate(0,0) rotate(0deg); }
    50% { transform:translate(-26px, 20px) rotate(-4deg); }
  }
  @keyframes driftBottom{
    0%, 100% { transform:rotate(180deg) translate(0,0); }
    50% { transform:rotate(180deg) translate(26px, -20px); }
  }
  @media (prefers-reduced-motion: reduce){
    .bg-fx .top, .bg-fx .bottom{ animation:none; }
    .bg-fx{ transition:none; }
  }

  main{
    position:relative;
    z-index:1;
    width:100%;
    max-width:430px;
    padding:52px 22px 40px;
    display:flex;
    flex-direction:column;
    align-items:center;
  }

  .logo-wrap{
    display:flex;
    align-items:center;
    justify-content:center;
    margin-bottom:10px;
  }
  .logo-wrap img{
    width:min(78%, 300px);
    height:auto;
    display:block;
  }

  .tagline{
    font-family:'Montserrat',sans-serif;
    font-weight:500;
    font-size:14.5px;
    letter-spacing:0.3px;
    color:var(--navy);
    margin:2px 0 30px;
    text-align:center;
  }

  /* ---------- Buttons ---------- */
  .buttons{
    width:100%;
    display:flex;
    flex-direction:column;
    gap:12px;
  }
  .btn{
    display:flex;
    align-items:center;
    gap:12px;
    width:100%;
    padding:15px 18px;
    border-radius:14px;
    text-decoration:none;
    font-family:'Montserrat',sans-serif;
    font-weight:600;
    font-size:15px;
    letter-spacing:0.2px;
    border:1px solid var(--card-line);
    background:var(--card);
    color:var(--ink);
    cursor:pointer;
    box-shadow:var(--card-shadow);
    transition:background 0.15s ease, border-color 0.15s ease;
  }
  .btn:active{ background:#f2efe9; }
  .btn .ic{ width:20px; height:20px; flex:none; }
  .btn .label{ flex:1; text-align:left; }
  .btn .arrow{ width:16px; height:16px; opacity:0.4; flex:none; }

  .btn-primary{
    background:linear-gradient(120deg, var(--orange), var(--orange-soft));
    border-color:transparent;
    color:#1a0d06;
  }
  .btn-primary .arrow{ opacity:0.75; }

  .btn-packages{ justify-content:space-between; }
  .chev{ transition:transform 0.2s ease; }
  .chev.open{ transform:rotate(180deg); }

  .packages{
    max-height:0;
    overflow:hidden;
    width:100%;
    transition:max-height 0.3s ease;
  }
  .packages.open{ max-height:280px; }
  .packages-inner{
    display:flex;
    flex-direction:column;
    gap:10px;
    padding:4px 2px 4px;
  }
  .pkg{
    background:#f6f4ef;
    border:1px solid var(--card-line);
    border-radius:12px;
    padding:13px 14px;
    display:flex;
    align-items:center;
    gap:12px;
  }
  .pkg svg{ width:20px; height:20px; flex:none; color:var(--orange); }
  .pkg span{ font-size:13.5px; color:var(--ink); font-weight:500; }

  .review-form{ padding:6px 2px 4px; }
  .stars{
    display:flex;
    gap:4px;
    justify-content:center;
    margin-bottom:10px;
  }
  .stars .star{
    background:none;
    border:none;
    font-size:26px;
    line-height:1;
    color:#d8d3c8;
    cursor:pointer;
    padding:2px;
    transition:color 0.15s ease;
  }
  .stars .star.active{ color:var(--orange); }
  .review-input{
    width:100%;
    font-family:'Montserrat',sans-serif;
    font-size:13.5px;
    color:var(--ink);
    background:#f6f4ef;
    border:1px solid var(--card-line);
    border-radius:10px;
    padding:11px 12px;
    margin-bottom:10px;
    resize:none;
  }
  .review-input::placeholder{ color:#9aa2a9; }
  .review-textarea{ min-height:70px; font-family:'Montserrat',sans-serif; }
  .review-status{
    text-align:center;
    font-size:12px;
    margin:8px 0 0;
    color:var(--navy);
    min-height:14px;
  }

  footer{
    margin-top:32px;
    text-align:center;
    font-size:11px;
    color:#93a0ab;
    letter-spacing:0.3px;
  }
  footer b{ color:var(--navy); }
</style>
</head>

<!-- EDITABLE: reemplaza con la config real de tu proyecto Firebase (Firebase Console > Configuración del proyecto > Tus apps > SDK de Firebase) -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "TU_API_KEY",
    authDomain: "TU_PROYECTO.firebaseapp.com",
    projectId: "TU_PROYECTO",
    storageBucket: "TU_PROYECTO.appspot.com",
    messagingSenderId: "TU_SENDER_ID",
    appId: "TU_APP_ID"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  // ---- fondo interactivo: las líneas reaccionan al mover el dedo o el mouse ----
  const bgFx = document.querySelector('.bg-fx');
  function moveBg(clientX, clientY) {
    const nx = (clientX / window.innerWidth) - 0.5;
    const ny = (clientY / window.innerHeight) - 0.5;
    const strength = 34;
    bgFx.style.transform = `translate(${-nx * strength}px, ${-ny * strength}px)`;
  }
  window.addEventListener('mousemove', (e) => moveBg(e.clientX, e.clientY));
  window.addEventListener('touchmove', (e) => {
    if (e.touches && e.touches[0]) moveBg(e.touches[0].clientX, e.touches[0].clientY);
  }, { passive: true });

  const pkgBtn = document.getElementById('togglePkg');
  const pkgPanel = document.getElementById('pkgPanel');
  const chev = document.getElementById('chev');
  pkgBtn.addEventListener('click', () => {
    pkgPanel.classList.toggle('open');
    chev.classList.toggle('open');
  });

  // ---- reseñas ----
  const reviewBtn = document.getElementById('toggleReview');
  const reviewPanel = document.getElementById('reviewPanel');
  const chevReview = document.getElementById('chevReview');
  reviewBtn.addEventListener('click', () => {
    reviewPanel.classList.toggle('open');
    chevReview.classList.toggle('open');
  });

  let selectedStars = 0;
  const starButtons = document.querySelectorAll('#starPicker .star');
  starButtons.forEach(starEl => {
    starEl.addEventListener('click', () => {
      selectedStars = parseInt(starEl.dataset.value, 10);
      starButtons.forEach(s => {
        s.classList.toggle('active', parseInt(s.dataset.value, 10) <= selectedStars);
      });
    });
  });

  const nameInput = document.getElementById('reviewName');
  const textInput = document.getElementById('reviewText');
  const statusEl = document.getElementById('reviewStatus');
  const submitBtn = document.getElementById('submitReview');

  submitBtn.addEventListener('click', async () => {
    const name = nameInput.value.trim();
    const comment = textInput.value.trim();

    if (!selectedStars) {
      statusEl.textContent = 'Selecciona una calificación.';
      return;
    }
    if (!comment) {
      statusEl.textContent = 'Escribe tu comentario.';
      return;
    }

    submitBtn.disabled = true;
    statusEl.textContent = 'Enviando...';

    try {
      await addDoc(collection(db, 'reviews'), {
        name: name || 'Anónimo',
        rating: selectedStars,
        comment: comment,
        approved: false,
        createdAt: serverTimestamp()
      });
      statusEl.textContent = '¡Gracias por tu reseña!';
      nameInput.value = '';
      textInput.value = '';
      selectedStars = 0;
      starButtons.forEach(s => s.classList.remove('active'));
    } catch (err) {
      statusEl.textContent = 'No se pudo enviar. Intenta de nuevo.';
      console.error(err);
    } finally {
      submitBtn.disabled = false;
    }
  });
</script>

</body>
